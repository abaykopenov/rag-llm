syntax = "proto3";

package rag;

option java_package = "com.rag.grpc";
option go_package = "rag/proto";

// ═══════════════════════════════════════════════════════════════
// RAG Service — основной сервис для работы с документами
// ═══════════════════════════════════════════════════════════════

service RAGService {
    // Загрузка документа (бинарные данные)
    rpc Upload(UploadRequest) returns (UploadResponse);

    // Задать вопрос по документам
    rpc Query(QueryRequest) returns (QueryResponse);

    // Streaming: вопрос с потоковым ответом
    rpc QueryStream(QueryRequest) returns (stream QueryChunk);

    // Оценка качества RAG (RAGAS)
    rpc Evaluate(EvalRequest) returns (EvalResponse);

    // Получить краткое содержание документа
    rpc GetSummary(SummaryRequest) returns (SummaryResponse);

    // Список коллекций
    rpc ListCollections(Empty) returns (CollectionList);

    // Health check
    rpc Health(Empty) returns (HealthResponse);
}


// ═══════════════════════════════════════════════════════════════
// Базовые типы
// ═══════════════════════════════════════════════════════════════

message Empty {}


// ═══════════════════════════════════════════════════════════════
// Upload
// ═══════════════════════════════════════════════════════════════

message UploadRequest {
    bytes file_content = 1;        // Содержимое файла
    string filename = 2;           // Имя файла (с расширением)
    string collection = 3;         // Коллекция (default: "default")
}

message UploadResponse {
    string document_id = 1;
    string filename = 2;
    string collection = 3;
    int32 pages_count = 4;
    int32 chunks_count = 5;
    string status = 6;
    float processing_time_ms = 7;
    string summary = 8;            // Краткое содержание (если LLM доступен)
}


// ═══════════════════════════════════════════════════════════════
// Query
// ═══════════════════════════════════════════════════════════════

message QueryRequest {
    string question = 1;
    string collection = 2;         // default: "default"
    int32 top_k = 3;               // default: из конфига
    float temperature = 4;
    int32 max_tokens = 5;
    // Metadata фильтры
    string document_id = 6;        // Фильтр по документу
    string element_type = 7;       // text, table, code, list
    string section = 8;            // Фильтр по секции
    // Hybrid search
    repeated string keywords = 9;  // Ключевые слова для hybrid search
}

message ChunkInfo {
    string id = 1;
    string text = 2;
    float score = 3;
    int32 page = 4;
    string section = 5;
}

message QueryResponse {
    string answer = 1;
    repeated ChunkInfo chunks_used = 2;
    string prompt = 3;
    string model = 4;
    int32 tokens_used = 5;
    map<string, float> timing = 6;
}

// Для streaming — по кусочкам
message QueryChunk {
    string text_delta = 1;         // Следующий кусочек текста
    bool is_final = 2;             // Последний кусочек?
    repeated ChunkInfo chunks_used = 3;  // Чанки (только в последнем)
    string model = 4;
}


// ═══════════════════════════════════════════════════════════════
// Evaluation (RAGAS)
// ═══════════════════════════════════════════════════════════════

message EvalSample {
    string question = 1;
    string ground_truth = 2;       // Опционально — эталонный ответ
}

message EvalRequest {
    repeated EvalSample samples = 1;
    string collection = 2;
    int32 top_k = 3;
}

message EvalMetric {
    string question = 1;
    float faithfulness = 2;
    float answer_relevancy = 3;
    float context_precision = 4;
    float context_recall = 5;
    float overall = 6;
    string answer_preview = 7;
}

message EvalResponse {
    int32 samples_count = 1;
    float avg_faithfulness = 2;
    float avg_answer_relevancy = 3;
    float avg_context_precision = 4;
    float avg_context_recall = 5;
    float avg_overall = 6;
    string grade = 7;              // A/B/C/D/F
    repeated EvalMetric results = 8;
    float eval_time_ms = 9;
}


// ═══════════════════════════════════════════════════════════════
// Summary
// ═══════════════════════════════════════════════════════════════

message SummaryRequest {
    string document_id = 1;
}

message SummaryResponse {
    string document_id = 1;
    string summary = 2;
    bool cached = 3;
}


// ═══════════════════════════════════════════════════════════════
// Collections
// ═══════════════════════════════════════════════════════════════

message CollectionInfo {
    string name = 1;
    int32 chunks_count = 2;
}

message CollectionList {
    repeated CollectionInfo collections = 1;
}


// ═══════════════════════════════════════════════════════════════
// Health
// ═══════════════════════════════════════════════════════════════

message HealthResponse {
    string status = 1;
    string version = 2;
    string llm_provider = 3;
    string embedding_provider = 4;
    bool reranker_enabled = 5;
}
